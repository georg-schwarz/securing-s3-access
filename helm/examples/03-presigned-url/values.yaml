replicaCount: 1

image:
  repository: securing-s3-access/backend
  tag: "latest"
  pullPolicy: IfNotPresent

backend:
  port: 8000
  jwtSecret: "change-me"
  s3EndpointUrl: "http://garage-instance.default.svc.cluster.local:3900"
  s3AccessKeyId: "your-access-key"
  s3SecretAccessKey: "your-secret-key"
  s3Region: "garage"
  presignedUrlTtlSeconds: 30

service:
  port: 8000

gateway:
  name: envoy-ingress
  namespace: "default"

resources: {}
