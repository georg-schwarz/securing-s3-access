apiVersion: v1
kind: Secret
metadata:
  name: {{ include "example-01.fullname" . }}-env
  namespace: example-01
  labels:
    {{- include "example-01.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.backend.jwtSecret | quote }}
  S3_ENDPOINT_URL: {{ .Values.backend.s3EndpointUrl | quote }}
  S3_ACCESS_KEY_ID: {{ .Values.backend.s3AccessKeyId | quote }}
  S3_SECRET_ACCESS_KEY: {{ .Values.backend.s3SecretAccessKey | quote }}
  S3_REGION: {{ .Values.backend.s3Region | quote }}
