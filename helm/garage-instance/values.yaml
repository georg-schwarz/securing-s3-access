adminToken: "please-change-this-admin-token-in-production"

cluster:
  replicas: 1
  zone: local
  replication:
    # factor must be <= replicas; use 1 for single-node demo
    factor: 1
  storage:
    size: 10Gi

buckets:
  alice:
    maxSize: 512Mi
  bob:
    maxSize: 512Mi

key:
  read: true
  write: true
